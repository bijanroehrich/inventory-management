name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Clone the marketplace into the workspace so we can pass a local path to
      # the action — the enterprise policy blocks the remote URL and rejects the
      # github: shorthand, but the action accepts local paths without validation.
      - name: Clone Claude plugins marketplace
        run: git clone --depth 1 https://github.com/anthropics/claude-plugins-official.git ./claude-plugins-official

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: './claude-plugins-official'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
